<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">
    <title>Заказать экскурсию</title>

    <link rel="icon" href="img/favicon.ico">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <header class="bg-dark">
        <nav class="navbar navbar-expand-lg navbar-dark container">

            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="img/logo.png" width="40" class="me-2">
                Музеи мира
            </a>

            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Главная</a>
                <a class="nav-link" href="catalog.html">Каталог</a>
                <a class="nav-link" href="order.html">Экскурсия</a>
            </div>

        </nav>
    </header>


    <main class="container mt-5">

        <h1 class="text-center mb-4">
            Заказать индивидуальную экскурсию
        </h1>

        <div class="row justify-content-center">

            <div class="col-md-6">

                <form>

                    <div class="mb-3">
                        <label class="form-label">Имя</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Телефон</label>
                        <input type="tel" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Музей</label>
                        <select class="form-select">
                            <option>Лувр</option>
                            <option>Эрмитаж</option>
                            <option>Британский музей</option>
                        </select>
                    </div>

                    <button class="btn btn-dark w-100">
                        Отправить
                    </button>

                </form>

            </div>

        </div>

    </main>


    <footer class="bg-dark text-white text-center p-4 mt-5">
        <p>© 2026 Музеи мира</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
